<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 1080px; height: 1080px;
    overflow: hidden;
  }
  .canvas {
    width: 1080px; height: 1080px;
    background: radial-gradient(circle at 32% 28%, #6366f1 0%, #4338ca 55%, #3730a3 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
  }
  .icon {
    font-size: 420px;
    line-height: 1;
    filter: drop-shadow(0 20px 30px rgba(0,0,0,0.25));
  }
  .word {
    margin-top: 10px;
    color: #ffffff;
    font-size: 96px;
    font-weight: 800;
    letter-spacing: -2px;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="icon">🧮</div>
    <div class="word">Jonas AI</div>
  </div>
</body>
</html>
