<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 1200px; height: 628px;
    overflow: hidden;
  }
  .canvas {
    width: 1200px; height: 628px;
    background: linear-gradient(135deg, #4338ca 0%, #6366f1 55%, #818cf8 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    padding: 0 90px;
    box-sizing: border-box;
    position: relative;
  }
  .icons {
    position: absolute;
    font-size: 60px;
    opacity: 0.18;
  }
  .i1 { top: 40px; left: 60px; }
  .i2 { bottom: 30px; left: 160px; font-size: 90px; }
  .i3 { top: 60px; right: 380px; font-size: 70px; }
  .left {
    z-index: 1;
  }
  .title {
    color: #ffffff;
    font-size: 76px;
    font-weight: 800;
    letter-spacing: -2px;
    margin: 0;
  }
  .subtitle {
    color: #e0e7ff;
    font-size: 32px;
    font-weight: 500;
    margin-top: 18px;
  }
  .badges {
    margin-top: 30px;
    display: flex;
    gap: 14px;
  }
  .badge {
    background: rgba(255,255,255,0.15);
    color: #ffffff;
    padding: 10px 22px;
    border-radius: 999px;
    font-size: 24px;
    font-weight: 600;
  }
  .right {
    font-size: 300px;
    z-index: 1;
    filter: drop-shadow(0 20px 30px rgba(0,0,0,0.25));
  }
</style>
</head>
<body>
  <div class="canvas">
    <span class="icons i1">➕</span>
    <span class="icons i2">✖️</span>
    <span class="icons i3">📐</span>
    <div class="left">
      <p class="title">Réussite Plus</p>
      <p class="subtitle">Tous niveaux • Toutes matières • 100% gratuit</p>
      <div class="badges">
        <span class="badge">🎓 CP à Terminale</span>
        <span class="badge">🌍 BAC international</span>
      </div>
    </div>
    <div class="right">🎓</div>
  </div>
</body>
</html>
